services:
  monolith-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runtime
    working_dir: /app
    command: ["python", "-m", "services.monolith.main"]
    volumes:
      - ../:/app
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: "INFO"
      MONOLITH_NODE_ID: "monolith-1"
      MONOLITH_PUBLIC_PORT: "50051"
      PYTHONPATH: "/app:/app/generated"
    ports:
      - "51051:50051"
    healthcheck:
      test: ["CMD", "python", "-m", "scripts.healthcheck", "--mode", "tcp", "--target", "127.0.0.1:50051", "--timeout-ms", "1000", "--service", "monolith-1"]
      interval: 5s
      timeout: 2s
      retries: 12
      start_period: 20s

